<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Image Scraper</title>
  <style>
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      padding: 12px;
      margin: 0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button:disabled {
      background: #9ca3af;
      color: white;
      cursor: default;
    }
    #status {
      margin-top: 4px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #374151;
      min-height: 16px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    .thumb {
      position: relative;
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      background: #f3f4f6;
    }
    .thumb.selected {
      border-color: #2563eb;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb .check {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #2563eb;
    }
    .thumb.selected .check {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }
    .thumb .quality {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 9px;
      line-height: 14px;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.55);
    }
    .thumb .quality.high { background: rgba(22, 163, 74, 0.75); }
    .thumb .quality.medium { background: rgba(202, 138, 4, 0.75); }
    .thumb .quality.low { background: rgba(220, 38, 38, 0.75); }
    select {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
    }
  </style>
</head>
<body>
  <h1>Image Scraper</h1>
  <div class="row">
    <button id="scrapeBtn">Scrape Images</button>
  </div>
  <div id="status"></div>
  <div class="row" id="filterRow" style="display: none">
    <label for="qualityFilter" style="font-size: 12px; align-self: center">Min quality:</label>
    <select id="qualityFilter">
      <option value="0">All</option>
      <option value="300">Medium (≥300px)</option>
      <option value="800">High (≥800px)</option>
    </select>
  </div>
  <div class="row" id="selectRow" style="display: none">
    <button class="secondary" id="selectAllBtn">Select All</button>
    <button class="secondary" id="selectNoneBtn">Select None</button>
  </div>
  <div id="grid"></div>
  <div class="row" id="downloadRow" style="display: none">
    <button id="downloadBtn">Download Selected (0)</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
